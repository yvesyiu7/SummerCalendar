<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 夏日．清涼．爽 - 活動議程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f9ff;
            scroll-behavior: smooth;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .tag-button {
            transition: all 0.2s ease;
        }
        .tag-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header Section -->
    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="max-w-4xl mx-auto px-4 py-6">
            <h1 class="text-2xl md:text-3xl font-bold text-sky-700 text-center mb-2">2026 夏日．清涼．爽</h1>
            <p class="text-gray-500 text-center text-sm mb-6">下午 15:00 - 18:00 | 活動議程清單</p>
            
            <!-- Category Filter -->
            <div id="filter-container" class="flex flex-wrap justify-center gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button id="filter-all" onclick="filterActivities('All', this)" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-sky-600 text-white shadow-md transition-all">全部</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div id="agenda-container" class="space-y-10">
            <!-- Loading State -->
            <div id="loading-spinner" class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-600 mb-4"></div>
                <p class="text-gray-500 animate-pulse">正在讀取 Calendar.csv ...</p>
            </div>
        </div>
    </main>

    <!-- Modal (Popup Details) -->
    <div id="detail-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden relative z-10 transform scale-95 transition-transform duration-300">
            <div id="modal-header-bg" class="h-32 bg-sky-500 flex items-end px-6 pb-4">
                <span id="modal-type-badge" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-white text-sky-700 shadow-sm">類型</span>
            </div>
            <div class="p-6">
                <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-2xl">&times;</button>
                <h2 id="modal-title" class="text-2xl font-bold text-gray-800 mb-2">活動名稱</h2>
                
                <div class="grid grid-cols-2 gap-4 mb-6 text-sm text-gray-600">
                    <div class="flex items-center">
                        <span class="mr-2">📅</span>
                        <span id="modal-date">日期</span>
                    </div>
                    <div class="flex items-center">
                        <span class="mr-2">🕒</span>
                        <span id="modal-time">時間</span>
                    </div>
                    <div class="flex items-center">
                        <span class="mr-2">📍</span>
                        <span id="modal-location">地點</span>
                    </div>
                    <div class="flex items-center">
                        <span class="mr-2">👥</span>
                        <span id="modal-capacity">人數</span>
                    </div>
                </div>

                <div class="border-t pt-4">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase mb-2">活動簡述</h3>
                    <p id="modal-desc" class="text-gray-700 leading-relaxed mb-4 whitespace-pre-line">內容略述...</p>
                    
                    <div class="bg-orange-50 p-3 rounded-lg flex justify-between items-center">
                        <span class="text-sm font-medium text-orange-700">收費情況</span>
                        <span id="modal-fee" class="font-bold text-orange-800">免費</span>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 border-t flex justify-end">
                <button onclick="closeModal()" class="bg-sky-600 text-white px-6 py-2 rounded-xl font-medium hover:bg-sky-700 transition-colors shadow-lg">關閉</button>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let currentFilter = "All";

        const categoryColors = {
            "大型聚會": "bg-purple-100 text-purple-700 border-purple-200",
            "運動": "bg-green-100 text-green-700 border-green-200",
            "美食": "bg-yellow-100 text-yellow-700 border-yellow-200",
            "DIY工作坊": "bg-pink-100 text-pink-700 border-pink-200",
            "腦力挑戰": "bg-blue-100 text-blue-700 border-blue-200",
            "保健": "bg-teal-100 text-teal-700 border-teal-200",
            "觸碰心靈": "bg-indigo-100 text-indigo-700 border-indigo-200",
            "default": "bg-gray-100 text-gray-700 border-gray-200"
        };

        const modalColors = {
            "大型聚會": "bg-purple-500", "運動": "bg-green-500", "美食": "bg-yellow-500", 
            "DIY工作坊": "bg-pink-500", "腦力挑戰": "bg-blue-500", "保健": "bg-teal-500", 
            "觸碰心靈": "bg-indigo-500", "default": "bg-sky-500"
        };

        // 初始化：讀取 CSV
        window.onload = async () => {
            try {
                const response = await fetch('Calendar.csv');
                if (!response.ok) throw new Error('無法讀取 Calendar.csv');
                const csvText = await response.text();
                rawData = parseCSV(csvText);
                initPage();
            } catch (error) {
                console.error("CSV Loading Error:", error);
                document.getElementById('agenda-container').innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-700 px-6 py-4 rounded-xl text-center">
                        <p class='font-bold mb-2'>讀取數據失敗</p>
                        <p class='text-sm'>請確保 Calendar.csv 與網頁放在同一目錄下，且透過 HTTP Server (如 GitHub Pages) 執行。</p>
                    </div>
                `;
            }
        };

        // 簡易 CSV 解析器
        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                // 處理可能包含逗號的引號文字 (e.g. "Text, with comma")
                const values = [];
                let current = "";
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = "";
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());

                // 映射到對象欄位
                return {
                    date: values[0] || "",
                    location: values[1] || "",
                    time: values[2] || "",
                    type: values[3] || "",
                    name: values[4] || "",
                    desc: values[5] || "",
                    fee: values[6] || "免費",
                    capacity: values[7] || "不限"
                };
            }).filter(item => item.name !== ""); // 過濾空行
        }

        function initPage() {
            setupFilters();
            renderAgenda();
        }

        function setupFilters() {
            const types = [...new Set(rawData.map(item => item.type).filter(Boolean))];
            const container = document.getElementById('filter-container');
            
            types.forEach(type => {
                const btn = document.createElement('button');
                btn.className = "filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:border-sky-300 transition-all whitespace-nowrap";
                btn.innerText = type;
                btn.onclick = (e) => filterActivities(type, e.target);
                container.appendChild(btn);
            });
        }

        function filterActivities(type, targetBtn) {
            currentFilter = type;
            // UI切換
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-sky-600', 'text-white', 'shadow-md');
                btn.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
            });
            targetBtn.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');
            targetBtn.classList.add('bg-sky-600', 'text-white', 'shadow-md');
            
            renderAgenda();
        }

        function renderAgenda() {
            const container = document.getElementById('agenda-container');
            container.innerHTML = '';

            const filteredData = currentFilter === 'All' 
                ? rawData 
                : rawData.filter(item => item.type === currentFilter);

            if (filteredData.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400">目前沒有相關活動</div>`;
                return;
            }

            const grouped = filteredData.reduce((acc, curr) => {
                if (!acc[curr.date]) acc[curr.date] = [];
                acc[curr.date].push(curr);
                return acc;
            }, {});

            Object.keys(grouped).forEach(date => {
                const dateSection = document.createElement('section');
                dateSection.className = "animate-in fade-in slide-in-from-bottom-4 duration-500";
                
                dateSection.innerHTML = `
                    <div class="flex items-center mb-4">
                        <div class="bg-sky-600 text-white px-4 py-1 rounded-lg font-bold shadow-sm">${date}</div>
                        <div class="ml-4 flex-grow h-px bg-sky-100"></div>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        ${grouped[date].map((item) => {
                            const colorClass = categoryColors[item.type] || categoryColors.default;
                            // 轉義引號以防 JSON 字串出錯
                            const itemStr = JSON.stringify(item).replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                            return `
                                <button onclick='showDetails(${itemStr})' 
                                        class="tag-button px-4 py-2 rounded-xl border text-sm font-medium ${colorClass} glass-card">
                                    ${item.name}
                                </button>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(dateSection);
            });
        }

        function showDetails(item) {
            const modal = document.getElementById('detail-modal');
            const header = document.getElementById('modal-header-bg');
            
            document.getElementById('modal-title').innerText = item.name;
            document.getElementById('modal-date').innerText = item.date;
            document.getElementById('modal-time').innerText = item.time || "15:00-18:00";
            document.getElementById('modal-location').innerText = item.location;
            document.getElementById('modal-capacity').innerText = item.capacity;
            document.getElementById('modal-desc').innerText = item.desc;
            document.getElementById('modal-fee').innerText = item.fee;
            document.getElementById('modal-type-badge').innerText = item.type;
            
            header.className = `h-32 flex items-end px-6 pb-4 transition-colors duration-500 ${modalColors[item.type] || modalColors.default}`;
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('.transform').classList.replace('scale-95', 'scale-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('.transform').classList.replace('scale-100', 'scale-95');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
